name: trace_env
channels:
  - pytorch
  - pyg
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10

  # PyTorch & GPU support
  - pytorch::pytorch::2.0.0
  - pytorch::torchvision::0.15.1
  - pytorch::torchaudio::2.0.0
  - pytorch::pytorch-cuda=11.8

  # Graph Neural Networks
  - pytorch::pytorch-geometric=2.3.0
  - pytorch::pyg::2.3.0
  - pytorch::pyg_lib
  - pytorch::torch-scatter
  - pytorch::torch-sparse

  # Data Science & ML
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scikit-learn>=1.3.0
  - scipy>=1.10.0

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - plotly>=5.14.0

  # Development
  - jupyter>=1.0.0
  - ipython>=8.0.0
  - pytest>=7.0.0

  # Utilities
  - tqdm>=4.65.0
  - pyyaml>=6.0

  # Structure prediction (optional)
  - biopython>=1.81.0

  # Logging & monitoring
  - pip

pip:
  - # Add pip-only packages here
  - tensorboard>=2.13.0
  - wandb>=0.14.0
  - torch-lr-finder
  - torch-optim-lookahead
